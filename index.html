<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Regulation History</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <header>
    <span class="header-title">🏎 F1 Regulation History</span>
    <div class="header-controls">
      <select id="year-select">
        <option value="2000">2000年</option>
        <option value="2001">2001年</option>
        <option value="2002">2002年</option>
        <option value="2003">2003年</option>
        <option value="2004">2004年</option>
        <option value="2005">2005年</option>
        <option value="2006">2006年</option>
        <option value="2007">2007年</option>
        <option value="2008">2008年</option>
        <option value="2009">2009年</option>
        <option value="2010">2010年</option>
        <option value="2011">2011年</option>
        <option value="2012">2012年</option>
        <option value="2013">2013年</option>
        <option value="2014">2014年</option>
        <option value="2015">2015年</option>
        <option value="2016">2016年</option>
        <option value="2017">2017年</option>
        <option value="2018">2018年</option>
        <option value="2019">2019年</option>
        <option value="2020">2020年</option>
        <option value="2021">2021年</option>
        <option value="2022">2022年</option>
        <option value="2023">2023年</option>
        <option value="2024" selected>2024年</option>
        <option value="2025">2025年</option>
        <option value="2026">2026年</option>
      </select>
      <a class="header-nav-link" href="compare.html">年度比較 →</a>
    </div>
  </header>

  <main>
    <div class="car-image-wrap">
      <img id="car-image" class="car-image-single" src="" alt="F1カーイメージ">
      <p id="year-label" class="car-image-label"></p>
    </div>

    <div class="accordion" id="accordion">

      <div class="accordion-item" data-category="engine">
        <button class="accordion-header" aria-expanded="false">
          ① エンジン／パワーユニット
        </button>
        <div class="accordion-body" id="section-engine"></div>
      </div>

      <div class="accordion-item" data-category="chassis">
        <button class="accordion-header" aria-expanded="false">
          ② 車体／シャシー
        </button>
        <div class="accordion-body" id="section-chassis"></div>
      </div>

      <div class="accordion-item" data-category="aero">
        <button class="accordion-header" aria-expanded="false">
          ③ 空力・タイヤ・ホイール
        </button>
        <div class="accordion-body" id="section-aero"></div>
      </div>

      <div class="accordion-item" data-category="race_rules">
        <button class="accordion-header" aria-expanded="false">
          ④ レースルール（Format）
        </button>
        <div class="accordion-body" id="section-race_rules"></div>
      </div>

      <div class="accordion-item" data-category="safety">
        <button class="accordion-header" aria-expanded="false">
          ⑤ 安全・健康
        </button>
        <div class="accordion-body" id="section-safety"></div>
      </div>

      <div class="accordion-item" data-category="cost">
        <button class="accordion-header" aria-expanded="false">
          ⑥ コスト・開発制限
        </button>
        <div class="accordion-body" id="section-cost"></div>
      </div>

      <div class="accordion-item" data-category="media">
        <button class="accordion-header" aria-expanded="false">
          ⑦ メディア・運営・公平性
        </button>
        <div class="accordion-body" id="section-media"></div>
      </div>

      <div class="accordion-item" data-category="environment">
        <button class="accordion-header" aria-expanded="false">
          ⑧ 環境・サステナビリティ
        </button>
        <div class="accordion-body" id="section-environment"></div>
      </div>

    </div>
  </main>

  <script defer src="app.js"></script>
</body>
</html>
